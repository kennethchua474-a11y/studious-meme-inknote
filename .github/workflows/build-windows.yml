name: Build Windows Executable

on:
  push:
    branches: [ main ]
    tags:
      - "v*"
  pull_request:

permissions:
  contents: write  # required for creating releases

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        run: pip install poetry

      - name: Install dependencies
        run: poetry install

      - name: Run tests
        run: poetry run pytest

      - name: Install PyInstaller
        run: poetry run pip install pyinstaller

      - name: Build executable
        run: poetry run pyinstaller InkNote.spec

      # ✅ Package into single zip (FIXES your errors)
      - name: Create zip archive
        run: |
          powershell Compress-Archive `
            -Path dist/InkNote/* `
            -DestinationPath InkNote-${{ github.ref_name }}.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: InkNote-${{ github.ref_name }}
          path: InkNote-${{ github.ref_name }}.zip

      # ✅ Only runs for tags → avoids rate limits
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: InkNote-${{ github.ref_name }}.zip
          fail_on_unmatched_files: true
