name: Build Windows Executable

on:
  push:
    branches: [ main ]
    tags:
      - "v*"
  pull_request:
    branches: [ main ]  # Limit pull_request to main branch only

permissions:
  contents: write
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        run: pip install poetry

      - name: Install dependencies
        run: poetry install

      - name: Run tests
        run: poetry run pytest

      - name: Install PyInstaller
        run: poetry run pip install pyinstaller

      - name: Build executable
        run: poetry run pyinstaller InkNote.spec

      - name: Upload executable artifact
        uses: actions/upload-artifact@v4
        with:
          name: InkNote-${{ github.ref_name }}
          path: dist/InkNote

      - name: Create Github Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/') && github.event_name == 'push'  # Only on tag pushes
        with:
          files: dist/InkNote/**
          generate_release_notes: true  # Optional: auto-generate release notes
