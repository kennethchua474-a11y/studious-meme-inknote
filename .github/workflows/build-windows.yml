name: Build Windows Executable

on:
  push:
    branches: [ main ]
    tags:
      - "v*"
  pull_request:

permissions:
  contents: write  # required for creating releases

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      # -------------------------
      # Checkout
      # -------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # -------------------------
      # Python setup
      # -------------------------
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # -------------------------
      # Install Poetry
      # -------------------------
      - name: Install Poetry
        run: pip install poetry

      # -------------------------
      # Install dependencies
      # -------------------------
      - name: Install dependencies
        run: poetry install

      # -------------------------
      # Run tests
      # -------------------------
      - name: Run tests
        run: poetry run pytest

      # -------------------------
      # Install PyInstaller
      # -------------------------
      - name: Install PyInstaller
        run: poetry run pip install pyinstaller

      # -------------------------
      # Build executable
      # -------------------------
      - name: Build executable
        run: poetry run pyinstaller InkNote.spec

      # -------------------------
      # Install Inno Setup
      # -------------------------
      - name: Install Inno Setup
        run: choco install innosetup -y

      # -------------------------
      # Build installer
      # -------------------------
      - name: Build installer
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer.iss

      # -------------------------
      # Upload installer artifact
      # -------------------------
      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: InkNote-Setup-${{ github.ref_name }}
          path: Output/InkNote-Setup.exe

      # -------------------------
      # Create GitHub Release (ONLY for tags)
      # -------------------------
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: Output/InkNote-Setup.exe
          fail_on_unmatched_files: true
