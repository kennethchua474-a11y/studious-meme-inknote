name: Build Windows Executable

on:
  push:
    branches: [main]
    tags:
      - "v*"
  pull_request:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      # -------------------------
      # Checkout
      # -------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # -------------------------
      # Python setup
      # -------------------------
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # -------------------------
      # Install Poetry
      # -------------------------
      - name: Install Poetry
        shell: powershell
        run: pip install poetry

      # -------------------------
      # Install dependencies
      # -------------------------
      - name: Install dependencies
        shell: powershell
        run: poetry install

      # -------------------------
      # Run tests
      # -------------------------
      - name: Run tests
        shell: powershell
        run: poetry run pytest

      # -------------------------
      # Install PyInstaller
      # -------------------------
      - name: Install PyInstaller
        shell: powershell
        run: poetry run pip install pyinstaller

      # -------------------------
      # Extract version from tag
      # -------------------------
      - name: Extract version from tag
        if: ${{ startsWith(github.ref, 'refs/tags/') }}
        shell: powershell
        run: |
          "INKNOTE_VERSION=$($env:GITHUB_REF_NAME -replace '^v', '')" >> $env:GITHUB_ENV

      # -------------------------
      # Validate semantic version
      # -------------------------
      - name: Validate semantic version
        if: ${{ startsWith(github.ref, 'refs/tags/') }}
        shell: powershell
        run: |
          if ("${{ github.ref_name }}" -notmatch "^v\d+\.\d+\.\d+$") {
            Write-Error "Invalid version tag. Use vMAJOR.MINOR.PATCH"
            exit 1
          }

      # -------------------------
      # Set dev version
      # -------------------------
      - name: Set dev version
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        shell: powershell
        run: |
          "INKNOTE_VERSION=dev-${{ github.sha }}" >> $env:GITHUB_ENV

      # -------------------------
      # Generate version file
      # -------------------------
      - name: Generate version file
        shell: powershell
        run: |
          $ver = $env:INKNOTE_VERSION -replace '\.', ','

          @"
          VSVersionInfo(
            ffi=FixedFileInfo(
              filevers=($ver,0),
              prodvers=($ver,0),
              mask=0x3f,
              flags=0x0,
              OS=0x40004,
              fileType=0x1,
              subtype=0x0,
              date=(0,0)
            ),
            kids=[
              StringFileInfo(
                [
                  StringTable(
                    u'040904B0',
                    [
                      StringStruct(u'CompanyName', u'InkNote'),
                      StringStruct(u'FileDescription', u'InkNote Text Editor'),
                      StringStruct(u'FileVersion', u'$env:INKNOTE_VERSION'),
                      StringStruct(u'ProductName', u'InkNote'),
                      StringStruct(u'ProductVersion', u'$env:INKNOTE_VERSION')
                    ]
                  )
                ]
              ),
              VarFileInfo([VarStruct(u'Translation', [1033, 1200])])
            ]
          )
          "@ | Out-File -Encoding utf8 version.txt

      # -------------------------
      # Build executable
      # -------------------------
      - name: Build executable
        shell: powershell
        run: poetry run pyinstaller InkNote.spec

      # -------------------------
      # Install Inno Setup
      # -------------------------
      - name: Install Inno Setup
        shell: powershell
        run: choco install innosetup -y

      # -------------------------
      # Build installer
      # -------------------------
      - name: Build installer
        shell: cmd
        run: |
          "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer.iss /DMyAppVersion=${{ env.INKNOTE_VERSION }}

      # -------------------------
      # Upload installer artifact
      # -------------------------
      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: InkNote-Setup-${{ github.ref_name }}
          path: Output/InkNote-Setup.exe

      # -------------------------
      # Create GitHub Release (tags only)
      # -------------------------
      - name: Create GitHub Release
        if: ${{ startsWith(github.ref, 'refs/tags/') }}
        uses: softprops/action-gh-release@v2
        with:
          files: Output/InkNote-Setup.exe
          fail_on_unmatched_files: true
